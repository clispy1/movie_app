<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieLand Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Scroll Progress Bar -->
    <div id="scroll-progress"></div>

    <!-- Cursor Spotlight -->
    <div id="cursor-spotlight"></div>

    <!-- Film Grain Overlay -->
    <div class="grain-overlay"></div>

    <!-- Immersive Background Blobs -->
    <div class="blob-container">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <a href="#">MovieLand</a>
            </div>
            <nav class="nav-links">
                <p class="section-title">Discover</p>
                <a href="#" data-genre="all" class="active"><span>Trending</span></a>
                <a href="#" data-genre="watchlist"><span>My Watchlist</span></a>
                <p class="section-title" style="margin-top: 2rem;">Genres</p>
                <div id="genres-container"></div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="header">
                <!-- TV/Movie Toggle & Search -->
                <div class="search-container"
                    style="display: flex; gap: 1rem; align-items: center; width: 100%; max-width: 600px;">
                    <div class="media-type-toggle">
                        <button id="toggle-movie" class="type-btn active">Movies</button>
                        <button id="toggle-tv" class="type-btn">TV Shows</button>
                    </div>
                    <form id="form" style="flex:1;">
                        <input type="text" id="searchfield" placeholder="Press / to search..." class="search-bar">
                    </form>
                </div>

                <!-- Advanced Filters -->
                <div class="grid-controls">
                    <span class="results-text"><span class="results">0</span> Results</span>
                    <div class="advanced-filters-wrapper">
                        <button id="filters-btn" class="glass-btn">Filters ⚙️</button>
                        <div id="filters-dropdown" class="glass-dropdown hidden">
                            <label>Release Year</label>
                            <input type="number" id="filter-year" placeholder="e.g. 2023" min="1900" max="2100"
                                class="glass-input">
                            <label>Min Rating</label>
                            <input type="number" id="filter-rating" placeholder="0 - 10" min="0" max="10" step="0.5"
                                class="glass-input">
                            <label>Safe Search</label>
                            <select id="safesearch" class="glass-select">
                                <option value="false">Adult Content Off</option>
                                <option value="true">Adult Content On</option>
                            </select>
                        </div>
                    </div>
                    <select id="sort-by" class="glass-select">
                        <option value="popularity.desc">Most Popular</option>
                        <option value="vote_average.desc">Top Rated</option>
                        <option value="primary_release_date.desc">Newest First</option>
                        <option value="revenue.desc">Box Office</option>
                    </select>
                </div>
            </header>

            <!-- Hero Section -->
            <section class="hero" id="hero">
                <div class="hero-timer"></div>
            </section>

            <!-- Watchlist Stats -->
            <section class="watchlist-stats hidden" id="watchlist-stats">
                <div class="stat-card">
                    <h3>Total Titles</h3>
                    <p id="stat-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>Avg Rating</h3>
                    <p id="stat-rating">0.0</p>
                </div>
            </section>

            <!-- Recently Viewed -->
            <section id="recently-viewed-section" class="hidden">
                <p class="section-title-sm" style="margin-bottom: 1.5rem;">🕐 Recently Viewed</p>
                <div class="horizontal-scroll" id="recently-viewed-list"></div>
                <hr style="border-color: var(--surface-border); margin: 3rem 0;">
            </section>

            <!-- Movie Grid -->
            <div id="main" class="movie-grid"></div>
        </main>
    </div>

    <!-- Movie Detail Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Bottom Navigation (Mobile Only) -->
    <nav class="bottom-nav" id="bottom-nav">
        <div class="bottom-nav-item active" id="bnav-home" onclick="bottomNavClick('home')">
            <span class="nav-icon">🎬</span>
            <span>Discover</span>
        </div>
        <div class="bottom-nav-item" id="bnav-search" onclick="bottomNavClick('search')">
            <span class="nav-icon">🔍</span>
            <span>Search</span>
        </div>
        <div class="bottom-nav-item" id="bnav-watchlist" onclick="bottomNavClick('watchlist')">
            <span class="nav-icon">❤️</span>
            <span>Watchlist</span>
        </div>
    </nav>

    <script src="./index.js"></script>
</body>

</html>
